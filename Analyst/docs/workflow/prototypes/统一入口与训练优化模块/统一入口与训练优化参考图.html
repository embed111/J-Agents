<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>统一入口与训练优化参考图</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --panel: #ffffff;
      --line: #d9dde3;
      --text: #1f2329;
      --muted: #667085;
      --accent: #1f6feb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: linear-gradient(180deg, #f8fafc, var(--bg));
      color: var(--text);
      font: 14px/1.6 "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    .wrap {
      width: min(1200px, calc(100vw - 32px));
      margin: 24px auto 40px;
    }
    .hero,
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
    }
    .hero {
      padding: 20px 22px;
      margin-bottom: 18px;
    }
    h1, h2, p { margin: 0; }
    h1 { font-size: 24px; line-height: 1.2; }
    .meta {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
    }
    .grid {
      display: grid;
      gap: 16px;
    }
    .card {
      overflow: hidden;
    }
    .card-body {
      padding: 16px 18px 18px;
    }
    .tag {
      display: inline-flex;
      align-items: center;
      padding: 2px 10px;
      border-radius: 999px;
      background: #eef4ff;
      color: var(--accent);
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .desc {
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
    }
    img {
      display: block;
      width: 100%;
      height: auto;
      border-top: 1px solid var(--line);
      background: #f7f8fa;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>统一入口与训练优化参考图</h1>
      <p class="meta">主题对应：`需求详情-统一入口与训练优化模块.md`。本页整理当前已完成的训练中心界面参考图，便于后续继续对齐角色资产与训练运营的展示口径。</p>
    </section>

    <section class="grid">
      <article class="card">
        <div class="card-body">
          <div class="tag">验收截图复用</div>
          <h2>角色资产与版本页</h2>
          <p class="desc">覆盖统一入口、角色卡、角色详情、版本历史与训练中心主布局。</p>
        </div>
        <img src="./统一入口与训练优化参考图-角色资产页.png" alt="统一入口与训练优化参考图-角色资产页" />
      </article>

      <article class="card">
        <div class="card-body">
          <div class="tag">验收截图复用</div>
          <h2>训练运营页</h2>
          <p class="desc">覆盖手动计划入队、训练师匹配、队列列表与执行结果区。</p>
        </div>
        <img src="./统一入口与训练优化参考图-训练运营页.png" alt="统一入口与训练优化参考图-训练运营页" />
      </article>

      <article class="card">
        <div class="card-body">
          <div class="tag">新增闭环原型</div>
          <h2>训练闭环页</h2>
          <p class="desc">覆盖训练计划、Codex 资料筛选、Skill 工作集、三轮平均分评测、迭代决策与本轮增量回退。</p>
        </div>
        <img src="./训练运营-训练闭环参考图.png" alt="训练运营-训练闭环参考图" />
      </article>
    </section>
  </div>
</body>
</html>
