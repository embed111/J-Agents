promotion:
  stable_rounds_required: 3
  require_high_risk_regression_pass: true
  require_no_critical_regression: true

critical_regression_rules:
  - "高风险任务任一失败 => 关键退化"
  - "候选输出在需求对齐上低于生产且降幅>=10% => 关键退化"
  - "出现未确认假设直接推进关键结论 => 关键退化"

rollback:
  keep_previous_prod_snapshot: true
  rollback_on_first_critical_regression: true
